# /etc/nginx/sites-available/biglinker
# 설치: sudo ln -s /etc/nginx/sites-available/biglinker /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name biglinker.kr www.biglinker.kr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name biglinker.kr www.biglinker.kr;

    # SSL (certbot이 자동 설정)
    ssl_certificate     /etc/letsencrypt/live/biglinker.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/biglinker.kr/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;

    # 파일 업로드 최대 크기
    client_max_body_size 30M;

    # SSE 스트리밍 설정 (Claude API 응답)
    location /api/claude/stream {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # SSE를 위한 중요 설정
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    # 나머지 모든 요청
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # 보안 헤더
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # 로그
    access_log /var/log/nginx/biglinker.access.log;
    error_log  /var/log/nginx/biglinker.error.log;
}
