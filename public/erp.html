<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>빅링커 ERP — 사내 통합 업무 시스템</title>
<style>
:root{--bg:#07090f;--s1:#0c0e18;--s2:#111422;--s3:#171b30;--s4:#1e233d;--text:#dde1f5;--muted:#5a5e80;--border:rgba(255,255,255,0.055);--blue:#4f7dff;--blue2:rgba(79,125,255,.12);--gold:#f59e0b;--gold2:rgba(245,158,11,.12);--teal:#22d3ee;--teal2:rgba(34,211,238,.12);--green:#2dd4a0;--red:#f87171;--r8:8px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.6}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--s4);border-radius:2px}

.login-wrap{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 30% 20%,rgba(79,125,255,.08),transparent 60%),var(--bg);z-index:1000}
.login-card{width:100%;max-width:440px;background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.login-title{text-align:center;margin-bottom:32px;font-size:24px;font-weight:700}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;font-weight:600}
input[type="text"],input[type="password"],input[type="date"],input[type="month"],input[type="datetime-local"],input[type="number"],select,textarea{width:100%;padding:12px 14px;background:var(--s2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:border-color 0.2s}
input:focus,select:focus,textarea:focus{border-color:var(--blue)}
select{cursor:pointer}
.btn{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;transition:background 0.2s;margin-top:8px;font-family:inherit}
.btn:hover{background:#6b93ff}
.btn-danger{background:var(--red)}
.btn-danger:hover{background:#fb7185}
.btn.sm{width:auto;padding:6px 12px;font-size:12px;margin-right:6px}
.err{color:var(--red);font-size:11px;margin-top:8px;min-height:16px}

.app{display:flex;flex-direction:column;height:100vh}
.topbar{position:sticky;top:0;z-index:100;height:52px;background:rgba(7,9,15,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px}
.topbar-brand{font-weight:600;white-space:nowrap;font-size:15px}
.topbar-brand .acc{font-weight:700}
.topbar-right{display:flex;align-items:center;gap:14px;margin-left:auto}
.role-badge{font-size:11px;color:#fff;padding:4px 10px;border-radius:12px;font-weight:600;white-space:nowrap}
.role-badge.ceo{background:var(--gold)}
.role-badge.manager{background:var(--blue)}
.role-badge.employee{background:var(--teal)}
.btn-logout{padding:5px 10px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);cursor:pointer;font-size:11px;font-family:inherit;transition:all 0.2s}
.btn-logout:hover{color:var(--red);border-color:rgba(248,113,113,.4)}

.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:200px;border-right:1px solid var(--border);padding:12px 8px;overflow-y:auto;background:var(--bg)}
.nav-section{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:10px 8px 6px;font-weight:700;margin-top:8px}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;cursor:pointer;color:var(--muted);font-size:13px;transition:all 0.2s;border:1px solid transparent;margin-bottom:2px}
.nav-item:hover{color:var(--text);background:var(--s2)}
.nav-item.on{color:var(--text);background:var(--s2);border-color:var(--border)}
.nav-icon{font-size:14px;width:16px;text-align:center;flex-shrink:0}

.content{flex:1;overflow-y:auto;padding:24px 28px}
.page{display:none}
.page.on{display:block;animation:fadeIn 0.2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1}}

.page-header{margin-bottom:24px;display:flex;justify-content:space-between;align-items:center}
.page-title{font-size:22px;font-weight:700}
.page-actions{display:flex;gap:8px}

.dashboard-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:24px}
.kpi-card{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:20px;display:flex;flex-direction:column}
.kpi-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:8px;font-weight:600}
.kpi-value{font-size:28px;font-weight:700;margin-bottom:4px}
.kpi-unit{font-size:12px;color:var(--muted)}
.kpi-badge{width:4px;height:4px;border-radius:50%;display:inline-block;margin-right:6px}
.kpi-badge.gold{background:var(--gold)}
.kpi-badge.blue{background:var(--blue)}
.kpi-badge.teal{background:var(--teal)}

.table-wrap{background:var(--s1);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:24px}
.table-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:center}
.table-header h3{font-size:14px;font-weight:600;flex:1;margin:0}
.table-actions{display:flex;gap:6px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--s2);padding:12px 16px;text-align:left;font-weight:600;color:var(--text);border-bottom:1px solid var(--border)}
td{padding:12px 16px;border-bottom:1px solid var(--border)}
tr:hover{background:var(--s2)}

.badge{display:inline-block;padding:4px 8px;border-radius:4px;font-size:10px;font-weight:600}
.badge.ready{background:rgba(45,212,160,.15);color:var(--green)}
.badge.pending{background:rgba(245,158,11,.15);color:var(--gold)}
.badge.done{background:rgba(79,125,255,.15);color:var(--blue)}
.badge.urgent{background:rgba(248,113,113,.15);color:var(--red)}
.badge.high{background:rgba(245,158,11,.15);color:var(--gold)}
.badge.normal{background:rgba(79,125,255,.15);color:var(--blue)}

.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:2000}
.modal.on{display:flex}
.modal-content{background:var(--s1);border-radius:12px;padding:24px;max-width:500px;width:90%;max-height:90vh;overflow-y:auto}
.modal-title{font-size:18px;font-weight:700;margin-bottom:16px}
.modal-close{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px}
.form-row{display:flex;gap:12px;margin-bottom:12px}
.form-col{flex:1;min-width:0}

.toast{position:fixed;bottom:20px;right:20px;background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:12px 16px;font-size:12px;z-index:3000;animation:slideIn 0.3s ease;box-shadow:0 8px 24px rgba(0,0,0,.3)}
@keyframes slideIn{from{transform:translateX(400px);opacity:0}to{transform:translateX(0);opacity:1}}
.toast.success{border-color:var(--green);color:var(--green)}
.toast.error{border-color:var(--red);color:var(--red)}

.chart-bar{display:flex;align-items:flex-end;gap:8px;height:150px;margin:16px 0}
.bar{flex:1;background:var(--blue2);border-radius:4px 4px 0 0;display:flex;flex-direction:column;justify-content:flex-end;padding:4px;position:relative;min-height:20px}
.bar-label{font-size:10px;color:var(--muted);text-align:center;margin-top:6px}
.bar-value{position:absolute;top:4px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:600;color:var(--text)}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.attendance-btn{width:100%;padding:16px;background:var(--blue);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:12px}
.attendance-btn:hover{opacity:0.9}
.attendance-info{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:12px}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0}
.info-label{font-size:11px;color:var(--muted)}
.info-value{font-size:13px;font-weight:600}

.progress-bar{width:100%;height:8px;background:var(--s2);border-radius:4px;overflow:hidden;margin:6px 0}
.progress-fill{height:100%;background:var(--blue);border-radius:4px;transition:width 0.3s}
.progress-text{font-size:11px;color:var(--muted);margin-top:2px}

.hidden{display:none!important}
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div class="login-wrap" id="login">
  <div class="login-card">
    <div class="login-title">빅링커 ERP</div>
    <div class="form-group">
      <label class="form-label">아이디</label>
      <input type="text" id="login-user" placeholder="사용자명">
    </div>
    <div class="form-group">
      <label class="form-label">비밀번호</label>
      <input type="password" id="login-pass" placeholder="비밀번호">
    </div>
    <button class="btn" onclick="doLogin()">로그인</button>
    <div class="err" id="login-err"></div>
    <div style="margin-top:20px;padding:12px;background:var(--s2);border-radius:8px;font-size:11px;color:var(--muted);line-height:1.6">
      <strong>테스트 계정:</strong><br>
      대표: ceo / ceo1234<br>
      관리자: admin / admin1234<br>
      직원: cons01 / 1234
    </div>
  </div>
</div>

<!-- 메인 앱 -->
<div class="app hidden" id="app">
  <!-- 상단바 -->
  <div class="topbar">
    <div class="topbar-brand">
      <span class="acc">빅</span>링커 ERP
    </div>
    <div style="flex:1"></div>
    <div class="topbar-right">
      <div class="role-badge" id="role-badge"></div>
      <span id="user-name"></span>
      <button class="btn-logout" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <!-- 레이아웃 -->
  <div class="layout">
    <!-- 사이드바 -->
    <div class="sidebar" id="sidebar"></div>

    <!-- 콘텐츠 -->
    <main class="content" id="content">
      <!-- 모든 페이지들이 여기에 렌더링됨 -->
    </main>
  </div>
</div>

<script>
const state = {
  user: null,
  data: {},
};

const API_BASE = '/api';

async function api(method, path, body = null) {
  const token = localStorage.getItem('erp_token');
  const opts = {
    method,
    headers: {
      'Content-Type': 'application/json',
      ...(token && { Authorization: `Bearer ${token}` }),
    },
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API_BASE + path, opts);
  if (res.status === 401) {
    localStorage.removeItem('erp_token');
    location.reload();
  }
  return res.json();
}

function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function showModal(title, content) {
  return new Promise((resolve) => {
    const modal = document.createElement('div');
    modal.className = 'modal on';
    modal.innerHTML = `
      <div class="modal-content">
        <button class="modal-close" onclick="this.parentElement.parentElement.remove()">✕</button>
        <div class="modal-title">${title}</div>
        ${content}
      </div>
    `;
    document.body.appendChild(modal);
  });
}

async function doLogin() {
  const user = document.getElementById('login-user').value;
  const pass = document.getElementById('login-pass').value;
  if (!user || !pass) { document.getElementById('login-err').textContent = '아이디와 비밀번호를 입력하세요'; return; }

  const res = await api('POST', '/auth/login', { username: user, password: pass });
  if (res.error) { document.getElementById('login-err').textContent = res.error; return; }

  localStorage.setItem('erp_token', res.token);
  const me = await api('GET', '/erp/me');
  state.user = me;

  document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  initApp();
}

function doLogout() {
  localStorage.removeItem('erp_token');
  location.reload();
}

function initApp() {
  renderSidebar();
  navigate('dashboard');
}

function renderSidebar() {
  const role = state.user.erpRole;
  const navs = {
    ceo: [
      { label: '📊 종합 대시보드', id: 'dashboard' },
      { label: '💰 재무 현황', id: 'finance' },
      { label: '👥 직원 현황', id: 'employees' },
      { label: '📈 OKR 관리', id: 'okr' },
      { label: '💼 연차관리', id: 'leave-management' },
      { label: '💹 팀매출현황', id: 'team-sales' },
      { label: '📅 공유캘린더', id: 'calendar' },
      { label: '📋 결재 관리', id: 'approvals' },
      { label: '📢 공지사항', id: 'notices' },
    ],
    manager: [
      { label: '📊 업무 현황', id: 'dashboard' },
      { label: '👥 팀 관리', id: 'employees' },
      { label: '✅ 업무 배분', id: 'tasks' },
      { label: '🕐 출퇴근관리', id: 'attendance-mgmt' },
      { label: '💼 연차신청', id: 'leave-request' },
      { label: '💹 월별매출', id: 'sales' },
      { label: '📅 공유캘린더', id: 'calendar' },
      { label: '📋 결재 처리', id: 'approvals' },
      { label: '📢 공지사항', id: 'notices' },
    ],
    employee: [
      { label: '🏠 내 현황', id: 'dashboard' },
      { label: '🕐 출퇴근', id: 'attendance' },
      { label: '✅ 나의 업무', id: 'tasks' },
      { label: '💼 연차신청', id: 'leave-request' },
      { label: '💹 월별매출', id: 'sales' },
      { label: '📅 일정', id: 'calendar' },
      { label: '📋 결재 신청', id: 'approvals' },
      { label: '📢 공지사항', id: 'notices' },
    ],
  };

  const html = navs[role].map(n => `<div class="nav-item" onclick="navigate('${n.id}')">${n.label}</div>`).join('');
  document.getElementById('sidebar').innerHTML = html;

  const badge = document.getElementById('role-badge');
  badge.className = `role-badge ${role}`;
  badge.textContent = role === 'ceo' ? '대표' : role === 'manager' ? '관리자' : '직원';
  document.getElementById('user-name').textContent = state.user.name;
}

function navigate(page) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('on'));
  event?.target?.classList.add('on');

  const content = document.getElementById('content');
  content.innerHTML = '';

  if (page === 'dashboard') renderDashboard(content);
  else if (page === 'finance') renderFinance(content);
  else if (page === 'employees') renderEmployees(content);
  else if (page === 'okr') renderOKR(content);
  else if (page === 'tasks') renderTasks(content);
  else if (page === 'schedules') renderSchedules(content);
  else if (page === 'attendance') renderAttendance(content);
  else if (page === 'attendance-mgmt') renderAttendanceManagement(content);
  else if (page === 'leave-request') renderLeaveRequest(content);
  else if (page === 'leave-management') renderLeaveManagement(content);
  else if (page === 'sales') renderSales(content);
  else if (page === 'team-sales') renderTeamSales(content);
  else if (page === 'calendar') renderCalendar(content);
  else if (page === 'approvals') renderApprovals(content);
  else if (page === 'notices') renderNotices(content);
}

async function renderDashboard(parent) {
  const data = await api('GET', '/erp/dashboard');
  const role = state.user.erpRole;

  let html = '<div class="page on"><div class="page-header"><h1 class="page-title">대시보드</h1></div>';

  if (role === 'ceo') {
    const { monthRev = 0, monthExp = 0, profit = 0, totalStudents = 0, totalEmp = 0, pendingAppr = 0 } = data.kpi || {};
    html += `
      <div class="dashboard-grid">
        <div class="kpi-card"><div class="kpi-label"><span class="kpi-badge gold"></span>이달 매출</div><div class="kpi-value">${(monthRev/1e6).toFixed(1)}</div><div class="kpi-unit">백만원</div></div>
        <div class="kpi-card"><div class="kpi-label">이달 지출</div><div class="kpi-value">${(monthExp/1e6).toFixed(1)}</div><div class="kpi-unit">백만원</div></div>
        <div class="kpi-card"><div class="kpi-label"><span class="kpi-badge green"></span>순이익</div><div class="kpi-value">${(profit/1e6).toFixed(1)}</div><div class="kpi-unit">백만원</div></div>
        <div class="kpi-card"><div class="kpi-label">수강생</div><div class="kpi-value">${totalStudents}</div><div class="kpi-unit">명</div></div>
        <div class="kpi-card"><div class="kpi-label">직원</div><div class="kpi-value">${totalEmp}</div><div class="kpi-unit">명</div></div>
        <div class="kpi-card"><div class="kpi-label"><span class="kpi-badge red"></span>결재 대기</div><div class="kpi-value">${pendingAppr}</div><div class="kpi-unit">건</div></div>
      </div>`;

    html += `<div class="table-wrap"><div class="table-header"><h3>팀 출퇴근 현황</h3></div><table>
      <tr><th>직원</th><th>부서</th><th>출근</th><th>퇴근</th><th>상태</th></tr>`;
    (data.teamAtt || []).forEach(r => {
      html += `<tr><td>${r.name}</td><td>${r.department||'-'}</td><td>${r.check_in||'-'}</td><td>${r.check_out||'-'}</td>
        <td><span class="badge ${r.status==='정상'?'ready':r.status==='지각'?'pending':'done'}">${r.status||'미출근'}</span></td></tr>`;
    });
    html += '</table></div>';
  } else if (role === 'manager') {
    const { studentCount = 0, pendingAppr = 0 } = data;
    html += `
      <div class="dashboard-grid">
        <div class="kpi-card"><div class="kpi-label">담당 학생</div><div class="kpi-value">${studentCount}</div><div class="kpi-unit">명</div></div>
        <div class="kpi-card"><div class="kpi-label"><span class="kpi-badge red"></span>결재 대기</div><div class="kpi-value">${pendingAppr}</div><div class="kpi-unit">건</div></div>
      </div>`;
    html += `<div class="table-wrap"><div class="table-header"><h3>팀 업무 진행</h3></div><table>
      <tr><th>업무</th><th>담당자</th><th>우선순위</th><th>상태</th><th>기한</th></tr>`;
    (data.teamTasks || []).forEach(t => {
      html += `<tr><td>${t.title}</td><td>${t.aname||'-'}</td><td><span class="badge ${t.priority==='긴급'?'urgent':t.priority==='높음'?'high':'normal'}">${t.priority}</span></td>
        <td><span class="badge ${t.status==='완료'?'done':'pending'}">${t.status}</span></td><td>${t.due_date||'-'}</td></tr>`;
    });
    html += '</table></div>';
  } else {
    html += `<div class="dashboard-grid">
      <div class="kpi-card"><div class="kpi-label">출근 시간</div><div class="kpi-value">${data.todayAttendance?.check_in || '미출근'}</div></div>
      <div class="kpi-card"><div class="kpi-label">퇴근 시간</div><div class="kpi-value">${data.todayAttendance?.check_out || '-'}</div></div>
      <div class="kpi-card"><div class="kpi-label">담당 학생</div><div class="kpi-value">${(data.myStudents || []).length}</div><div class="kpi-unit">명</div></div>
    </div>`;
    html += `<div class="table-wrap"><div class="table-header"><h3>나의 업무</h3></div><table>
      <tr><th>업무</th><th>우선순위</th><th>상태</th><th>기한</th></tr>`;
    (data.myTasks || []).forEach(t => {
      html += `<tr><td>${t.title}</td><td><span class="badge ${t.priority==='긴급'?'urgent':t.priority==='높음'?'high':'normal'}">${t.priority}</span></td>
        <td><span class="badge ${t.status==='완료'?'done':'pending'}">${t.status}</span></td><td>${t.due_date||'-'}</td></tr>`;
    });
    html += '</table></div>';
  }

  html += '</div>';
  parent.innerHTML = html;
}

async function renderFinance(parent) {
  if (state.user.erpRole !== 'ceo') { parent.innerHTML = '<p>접근 권한이 없습니다</p>'; return; }

  const data = await api('GET', '/erp/finance/summary');
  let html = '<div class="page on"><div class="page-header"><h1 class="page-title">재무 현황</h1></div>';

  html += '<div style="margin-bottom:24px"><h3 style="margin-bottom:12px">월별 매출·지출</h3>';
  const months = (data.monthly || []).map(m => m.month).slice(-6);
  const maxVal = Math.max(...(data.monthly || []).map(m => Math.max(m.revenue, m.expense)));
  html += '<div class="chart-bar">';
  (data.monthly || []).slice(-6).forEach(m => {
    const revH = (m.revenue / maxVal * 100) || 0;
    const expH = (m.expense / maxVal * 100) || 0;
    html += `<div style="flex:1"><div style="display:flex;gap:2px;height:120px;align-items:flex-end">
      <div style="flex:1;height:${revH}%;background:var(--blue);border-radius:2px"></div>

    </div><div style="font-size:10px;text-align:center;margin-top:6px;color:var(--muted)">${m.month}</div></div>`;
  });
  html += '</div><div style="font-size:11px;color:var(--muted);margin-top:8px">파란색: 매출 | 빨간색: 지출</div></div>';

  html += '<div class="grid-2"><div><h3>매출 분류</h3><table><tr><th>분류</th><th>금액</th></tr>';
  (data.revCat || []).forEach(r => html += `<tr><td>${r.category}</td><td>${(r.total/1e6).toFixed(1)}백만</td></tr>`);
  html += '</table></div><div><h3>지출 분류</h3><table><tr><th>분류</th><th>금액</th></tr>';
  (data.expCat || []).forEach(e => html += `<tr><td>${e.category}</td><td>${(e.total/1e6).toFixed(1)}백만</td></tr>`);
  html += '</table></div></div></div>';

        </thead>
        <tbody></tbody>
      </table>
    </div>
    <div style="margin-top:24px">
      <h3 style="font-size:14px;margin-bottom:12px">월별 합계</h3>
      <div class="chart-bar" id="sales-chart"></div>
    </div>
  `;

  const data = await api('GET', '/erp/individual-sales');
  const table = parent.querySelector('tbody');
  table.innerHTML = data.sales.map(s => `
    <tr>
      <td>${s.year_month}</td>
      <td><span class="badge">${s.category}</span></td>
      <td>${s.amount.toLocaleString()}원</td>
      <td>${s.description || '-'}</td>
      <td><button class="btn sm" onclick="editSales('${s.id}')">편집</button></td>
    </tr>
  `).join('');

  // 월별 차트
  const months = Object.keys(data.monthlySummary).sort();
  const maxAmount = Math.max(...Object.values(data.monthlySummary), 1);
  const chart = document.getElementById('sales-chart');
  if (chart) {
    chart.innerHTML = months.slice(-6).map(m => {
      const pct = Math.round((data.monthlySummary[m] / maxAmount) * 100);
      return `<div class="bar" style="height:${pct}%">
        <span class="bar-value">${(data.monthlySummary[m]/1000000).toFixed(1)}M</span>
        <span class="bar-label">${m}</span>
      </div>`;
    }).join('');
  }
}

  alert('매출 편집: ' + id);
}

// ═══════════════════════════════════════════════════════
// 팀 매출 현황 (대표용)
// ═══════════════════════════════════════════════════════

async function renderTeamSales(parent) {
  const month = new Date().toISOString().slice(0,7);
  parent.innerHTML = `
    <div class="page-header">
      <div class="page-title">💹 팀 매출 현황</div>
      <input type="month" id="team-sales-month" value="${month}" onchange="updateTeamSales()">
    </div>
    <div class="table-wrap">
      <div class="table-header"><h3>팀원별 매출</h3></div>
      <table id="team-sales-table">
        <thead>
          <tr><th>직원</th><th>매출액</th><th>카테고리</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  `;

  updateTeamSales();
}

async function updateTeamSales() {
  const month = document.getElementById('team-sales-month').value;
  const data = await api('GET', `/erp/team-sales/${month}`);
  const table = document.querySelector('#team-sales-table tbody');
  table.innerHTML = data.teamSales.map(s => `
    <tr>
      <td>${s.name}</td>
      <td style="font-weight:700">${s.total_amount.toLocaleString()}원</td>
      <td>${s.categories}개 카테고리</td>
    </tr>
  `).join('');

  // 합계 추가
  const header = document.querySelector('.table-header');
  header.innerHTML = `<h3>팀원별 매출 (합계: ${data.totalTeamSales.toLocaleString()}원)</h3>`;
}

// ═══════════════════════════════════════════════════════
// 공유 캘린더 (모두용)
// ═══════════════════════════════════════════════════════

async function renderCalendar(parent) {
  const today = new Date();
  const year = today.getFullYear();
  const month = String(today.getMonth() + 1).padStart(2, '0');

  parent.innerHTML = `
    <div class="page-header">
      <div class="page-title">📅 공유 캘린더</div>
      <button class="btn sm" onclick="openEventForm()">+ 일정 추가</button>
    </div>
    <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px">
      <div class="table-wrap">
        <div class="table-header">
          <h3>이번 달 일정</h3>
          <input type="month" id="calendar-month" value="${year}-${month}">
        </div>
        <table id="calendar-table">
          <thead>
            <tr><th>시간</th><th>제목</th><th>장소</th><th>참석자</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div style="background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:16px">
        <h3 style="font-size:14px;margin-bottom:12px">캘린더</h3>
        <div id="mini-calendar" style="font-size:12px"></div>
      </div>
    </div>
  `;

  loadCalendarEvents();
  renderMiniCalendar();
}

async function loadCalendarEvents() {
  const month = document.getElementById('calendar-month').value;
  const start_dt = month + '-01';
  const end_dt = new Date(month + '-01T23:59:59').toISOString().slice(0, 10);
  const nextMonth = new Date(month + '-01');
  nextMonth.setMonth(nextMonth.getMonth() + 1);
  const end_next = nextMonth.toISOString().slice(0, 10);

  const events = await api('GET', `/erp/calendar/events?start_dt=${start_dt}&end_dt=${end_next}`);
  const table = document.querySelector('#calendar-table tbody');
  table.innerHTML = events.map(e => `
    <tr>
      <td>${e.start_dt}</td>
      <td>${e.title}</td>
      <td>${e.location || '-'}</td>
      <td>${Array.isArray(e.attendees) ? e.attendees.length : 0}명</td>
    </tr>
  `).join('');
}

function renderMiniCalendar() {
  const today = new Date();
  const year = today.getFullYear();
  const month = today.getMonth();
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const startDate = new Date(firstDay);
  startDate.setDate(startDate.getDate() - firstDay.getDay());

  const calendar = document.getElementById('mini-calendar');
  const weeks = [];
  let currentWeek = [];

  for (let i = 0; i < 42; i++) {
    const date = new Date(startDate);
    date.setDate(date.getDate() + i);
    const isCurrentMonth = date.getMonth() === month;
    currentWeek.push(`<div style="padding:4px;text-align:center;color:${isCurrentMonth?'var(--text)':'var(--muted)'};">${date.getDate()}</div>`);
    if (currentWeek.length === 7) {
      weeks.push(`<div style="display:grid;grid-template-columns:repeat(7,1fr);">${currentWeek.join('')}</div>`);
      currentWeek = [];
    }
  }

  calendar.innerHTML = `
    <div style="margin-bottom:8px;font-weight:700">${year}년 ${month+1}월</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:8px">
      <div style="text-align:center;font-size:10px;color:var(--red)">일</div>
      <div style="text-align:center;font-size:10px">월</div>
      <div style="text-align:center;font-size:10px">화</div>
      <div style="text-align:center;font-size:10px">수</div>
      <div style="text-align:center;font-size:10px">목</div>
      <div style="text-align:center;font-size:10px">금</div>
      <div style="text-align:center;font-size:10px;color:var(--blue)">토</div>
    </div>
    ${weeks.join('')}
  `;
}

function openEventForm() {
  const form = `
    <form onsubmit="submitEvent(event)">
      <div class="form-group">
        <label class="form-label">제목</label>
        <input type="text" id="event-title" required>
      </div>
      <div class="form-row">
        <div class="form-col">
          <label class="form-label">시작</label>
          <input type="datetime-local" id="event-start" required>
        </div>
        <div class="form-col">
          <label class="form-label">종료</label>
          <input type="datetime-local" id="event-end">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">위치</label>
        <input type="text" id="event-location" placeholder="대면/회의실 등">
      </div>
      <div class="form-group">
        <label class="form-label">유형</label>
        <select id="event-type">
          <option value="회의">회의</option>
          <option value="상담">대면 상담</option>
          <option value="교육">교육/세미나</option>
          <option value="기타">기타</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">설명</label>
        <textarea id="event-desc" style="width:100%;padding:8px;border:1px solid var(--border);border-radius:6px;background:var(--s2);color:var(--text);font-family:inherit;font-size:13px;min-height:60px"></textarea>
      </div>
      <button type="submit" class="btn">추가하기</button>
    </form>
  `;
  showModal('새 일정 추가', form);
}

async function submitEvent(e) {
  e.preventDefault();
  const start = new Date(document.getElementById('event-start').value);
  const res = await api('POST', '/erp/calendar/events', {
    title: document.getElementById('event-title').value,
    type: document.getElementById('event-type').value,
    start_dt: start.toISOString().slice(0, 19),
    end_dt: document.getElementById('event-end').value ? new Date(document.getElementById('event-end').value).toISOString().slice(0, 19) : null,
    location: document.getElementById('event-location').value,
    description: document.getElementById('event-desc').value
  });
  if (res.success) {
    showToast('일정이 추가되었습니다', 'success');
    setTimeout(() => navigate('calendar'), 800);
  }
}

// 초기화
window.addEventListener('load', () => {
  const token = localStorage.getItem('erp_token');
  if (token) {
    document.getElementById('login').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    api('GET', '/erp/me').then(me => {
      state.user = me;
      initApp();
    }).catch(() => {
      localStorage.removeItem('erp_token');
      location.reload();
    });
  }
});
</script>
